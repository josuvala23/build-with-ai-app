<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Build with AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Propuesta de Proyecto IA</h1>

        <form action="/submit" method="POST">

                name="projectIdea"
                rows="10"
                placeholder="Describe tu proyecto de IA..."

            <button type="submit">
                Enviar propuesta
            </button>

        </form>
    </div>

</body>
</html>
